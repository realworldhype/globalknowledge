<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GLOBAL WAR ROOM INTELLIGENCE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/globe.gl"></script>

<style>
body{
margin:0;
font-family:Inter;
background:radial-gradient(circle at top,#050505,#000);
color:white;
overflow:hidden;
}

header{
display:flex;
justify-content:space-between;
padding:14px 18px;
background:rgba(0,0,0,0.9);
border-bottom:1px solid #222;
}

.title{
color:#ff3b3b;
font-weight:800;
letter-spacing:3px;
text-shadow:0 0 15px rgba(255,0,0,0.4);
}

.container{
display:flex;
height:calc(100vh - 55px);
}

/* GLOBE */
#globe{
flex:2;
filter:drop-shadow(0 0 20px rgba(255,0,0,0.2));
}

/* PANEL */
.panel{
flex:1;
background:rgba(10,10,10,0.95);
border-left:1px solid #222;
padding:12px;
overflow-y:auto;
}

.card{
background:rgba(20,20,20,0.7);
border:1px solid #333;
border-radius:10px;
padding:10px;
margin-bottom:10px;
transition:0.2s;
}

.card:hover{
transform:translateY(-2px);
border-color:#ff3b3b;
box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.small{font-size:12px;color:#aaa;}

.status{
padding:6px;
border-radius:6px;
font-size:12px;
margin-top:5px;
display:inline-block;
}

.safe{background:green;}
.elevated{background:orange;}
.high{background:red;}
</style>
</head>

<body>

<header>
<div class="title">⚔ GLOBAL WAR ROOM INTELLIGENCE</div>
<div id="clock"></div>
</header>

<div class="container">

<div id="globe"></div>

<div class="panel">
<h3>📡 REGIONAL STATUS</h3>
<div id="regionStatus"></div>

<h3>📊 MARKET RISK</h3>
<div id="stocks"></div>

<h3>📰 INTEL FEED</h3>
<div id="news"></div>
</div>

</div>

<script>

/////////////////////////////////////////////////////
// CLOCK
////////////////////////////////////////////////////
setInterval(()=>{
document.getElementById("clock").innerText =
new Date().toLocaleTimeString();
},1000);

/////////////////////////////////////////////////////
// GLOBAL STATE
////////////////////////////////////////////////////
let currentRegion="GLOBAL";

const regions=[
{lat:40.7,lng:-74,label:"US"},
{lat:51.5,lng:-0.1,label:"EU"},
{lat:35.6,lng:139.6,label:"ASIA"},
{lat:48.8,lng:2.3,label:"EUROPE"}
];

const riskLevel={
"US":"elevated",
"EU":"safe",
"ASIA":"high",
"EUROPE":"elevated",
"GLOBAL":"safe"
};

/////////////////////////////////////////////////////
// 🌍 WAR GLOBE
////////////////////////////////////////////////////
const globe = Globe()(document.getElementById('globe'))
.globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
.backgroundColor('black')

.pointsData(regions)
.pointLat(d=>d.lat)
.pointLng(d=>d.lng)
.pointColor(d=>{
return riskLevel[d.label]==="high"?"red":
riskLevel[d.label]==="elevated"?"orange":"green";
})
.pointAltitude(0.05)
.pointLabel(d=>d.label + " RISK: " + riskLevel[d.label])

.onPointClick(p=>{
currentRegion=p.label;
globe.pointOfView({lat:p.lat,lng:p.lng,altitude:1.7},800);
renderIntel();
});

/////////////////////////////////////////////////////
// 🧠 INTEL FEED (SIMULATED STABLE DATA)
////////////////////////////////////////////////////
const intel=[
"Satellite activity increased over monitored zone",
"Market volatility detected across tech sector",
"Cyber network traffic spike observed",
"Energy distribution instability reported",
"Global liquidity shift detected"
];

function renderIntel(){
const box=document.getElementById("news");
box.innerHTML="";

intel.forEach(i=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b>${i}</b>
<div class="small">region: ${currentRegion}</div>
`;
box.appendChild(div);
});
}

renderIntel();

/////////////////////////////////////////////////////
// 📊 WAR STOCK RISK ENGINE
////////////////////////////////////////////////////
let stocks=["AAPL","TSLA","NVDA"];
let history={};
let charts={};

const stockBox=document.getElementById("stocks");

stocks.forEach(s=>{
history[s]=[];

const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b>${s}</b>
<div id="p-${s}">loading...</div>
<canvas id="c-${s}"></canvas>
<div class="small" id="r-${s}">risk: analyzing...</div>
`;
stockBox.appendChild(div);
});

function risk(val){
if(val>0) return "HIGH";
if(val<0) return "ELEVATED";
return "SAFE";
}

async function updateStock(s){
try{
const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=d7kc2n1r01qiqbctqjpgd7kc2n1r01qiqbctqjq0`);
const d=await r.json();

if(!d||!d.c) return;

history[s].push(d.c);
if(history[s].length>20) history[s].shift();

document.getElementById(`p-${s}`).innerText=`$${d.c.toFixed(2)}`;

let rsk=risk(d.d);

document.getElementById(`r-${s}`).innerHTML=
`risk: <span class="status ${rsk.toLowerCase()}">${rsk}</span>`;

if(!charts[s]){
charts[s]=new Chart(document.getElementById(`c-${s}`),{
type:"line",
data:{labels:history[s],datasets:[{data:history[s],borderColor:"#ff3b3b",tension:0.3}]},
options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});
}else{
charts[s].data.datasets[0].data=history[s];
charts[s].update();
}

}catch(e){}
}

setInterval(()=>stocks.forEach(updateStock),6000);
stocks.forEach(updateStock);

</script>

</body>
</html>
